<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>finVault Architecture v2</title>
<style>
  :root {
    --bg: #edf4fb;
    --ink: #0f172a;
    --muted: #475569;
    --line: #64748b;
    --lane1: #fffaf0;
    --lane2: #f6fbff;
    --lane3: #f4fff8;
    --lane4: #fff7ed;
    --stroke1: #f59e0b;
    --stroke2: #60a5fa;
    --stroke3: #4ade80;
    --stroke4: #fb923c;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(circle at top left, rgba(59, 130, 246, 0.14), transparent 24%),
      radial-gradient(circle at top right, rgba(249, 115, 22, 0.10), transparent 20%),
      linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    color: var(--ink);
    font-family: "Segoe UI", Arial, sans-serif;
  }

  .page {
    padding: 24px;
  }

  h1 {
    margin: 0;
    font-size: 28px;
    letter-spacing: -0.03em;
  }

  .subtitle {
    margin-top: 8px;
    font-size: 14px;
    color: var(--muted);
  }

  .frame {
    margin-top: 18px;
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid rgba(148, 163, 184, 0.35);
    border-radius: 20px;
    box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    padding: 16px;
    overflow-x: auto;
  }

  svg {
    width: 1700px;
    height: 1080px;
    display: block;
  }

  .lane-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .title {
    font-size: 14px;
    font-weight: 700;
    fill: var(--ink);
  }

  .body {
    font-size: 10px;
    fill: var(--muted);
  }

  .small {
    font-size: 9px;
    fill: var(--muted);
  }

  .badge {
    font-size: 8px;
    font-weight: 700;
    fill: white;
    letter-spacing: 0.04em;
  }

  .note {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="page">
  <h1>finVault Architecture v2</h1>
  <div class="subtitle">Simplified logical architecture using official AWS Architecture Icons from the January 30, 2026 AWS icon package.</div>

  <div class="frame">
    <svg viewBox="0 0 1700 1080" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
        </marker>
        <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M0,0 L0,10 L10,5 z" fill="#16a34a"/>
        </marker>
        <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M0,0 L0,10 L10,5 z" fill="#ea580c"/>
        </marker>
      </defs>

      <!-- Lanes -->
      <rect x="16" y="16" width="1668" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="36" y="44" class="lane-label" fill="#334155">CLIENTS AND EDGE</text>

      <rect x="16" y="186" width="1668" height="270" rx="18" fill="var(--lane2)" stroke="var(--stroke2)"/>
      <text x="36" y="214" class="lane-label" fill="#1d4ed8">APPLICATION SERVICES</text>

      <rect x="16" y="476" width="1668" height="250" rx="18" fill="var(--lane3)" stroke="var(--stroke3)"/>
      <text x="36" y="504" class="lane-label" fill="#15803d">DATA AND STORAGE</text>

      <rect x="16" y="746" width="1668" height="250" rx="18" fill="var(--lane4)" stroke="var(--stroke4)"/>
      <text x="36" y="774" class="lane-label" fill="#c2410c">EXTERNAL PROVIDERS AND BACKGROUND FLOW</text>

      <!-- Top lane -->
      <rect x="60" y="72" width="240" height="68" rx="14" fill="#fff" stroke="#cbd5e1"/>
      <image href="architecture-assets/aws-icons/Res_Authenticated-User_48_Dark.svg" x="78" y="81" width="46" height="46"/>
      <text x="138" y="98" class="title">Investor / household user</text>
      <text x="138" y="118" class="body">Uses portfolio, spending, and research views</text>

      <rect x="360" y="56" width="350" height="96" rx="18" fill="#fff" stroke="#cbd5e1"/>
      <image href="architecture-assets/aws-icons/Res_Client_48_Dark.svg" x="382" y="80" width="50" height="50"/>
      <text x="448" y="92" class="title">finVault React SPA</text>
      <text x="448" y="112" class="body">Vite build served at `/app/*`</text>
      <text x="448" y="128" class="body">React 19, TanStack Query, React Router, Cognito auth</text>

      <rect x="780" y="72" width="220" height="68" rx="14" fill="#fff" stroke="#fcd34d"/>
      <image href="architecture-assets/aws-icons/Arch_Amazon-Cognito_64.svg" x="796" y="76" width="50" height="50"/>
      <text x="858" y="98" class="title">Amazon Cognito</text>
      <text x="858" y="118" class="body">User Pool v3 and JWT auth</text>

      <rect x="1060" y="56" width="430" height="96" rx="18" fill="#fff" stroke="#fcd34d"/>
      <image href="architecture-assets/aws-icons/Arch_Amazon-API-Gateway_64.svg" x="1082" y="80" width="56" height="56"/>
      <text x="1158" y="92" class="title">Amazon API Gateway HTTP API</text>
      <text x="1158" y="112" class="body">Single front door for the SPA, business APIs, receipt upload requests, and research/report endpoints</text>
      <text x="1158" y="128" class="body">Default Cognito JWT authorizer with public route exceptions for `/app/*`</text>

      <!-- Application services lane -->
      <rect x="54" y="246" width="240" height="150" rx="18" fill="#fff" stroke="#bfdbfe"/>
      <image href="architecture-assets/aws-icons/Arch_AWS-Lambda_64.svg" x="72" y="260" width="50" height="50"/>
      <text x="138" y="282" class="title">Frontend delivery</text>
      <text x="138" y="302" class="body">FrontendProxyFunction</text>
      <text x="138" y="318" class="body">Reads built assets from frontend S3 bucket</text>
      <text x="138" y="334" class="body">Public GET `/app` and `/app/*`</text>
      <rect x="54" y="232" width="52" height="16" rx="8" fill="#2563eb"/>
      <text x="80" y="243" class="badge" text-anchor="middle">Node</text>

      <rect x="328" y="246" width="300" height="150" rx="18" fill="#fff" stroke="#bfdbfe"/>
      <image href="architecture-assets/aws-icons/Arch_AWS-Lambda_64.svg" x="346" y="260" width="50" height="50"/>
      <text x="412" y="282" class="title">Core application APIs</text>
      <text x="412" y="302" class="body">AssetsApi, LiabilitiesApi, AccountsApi, SpendingApiFunction</text>
      <text x="412" y="318" class="body">Household accounts, permissions, holdings, liabilities, spending dashboard</text>
      <text x="412" y="334" class="body">Most business CRUD and query traffic lands here</text>
      <rect x="328" y="232" width="52" height="16" rx="8" fill="#2563eb"/>
      <text x="354" y="243" class="badge" text-anchor="middle">Node</text>

      <rect x="662" y="246" width="300" height="150" rx="18" fill="#fff" stroke="#bfdbfe"/>
      <image href="architecture-assets/aws-icons/Arch_AWS-Lambda_64.svg" x="680" y="260" width="50" height="50"/>
      <text x="746" y="282" class="title">Market and derivatives APIs</text>
      <text x="746" y="302" class="body">PricesFunction, OptionsQuoteFunction, OptionMarksFunction</text>
      <text x="746" y="318" class="body">Portfolio prices, options quotes, and option mark calculations</text>
      <text x="746" y="334" class="body">Used by portfolio, options, and NAV views</text>
      <rect x="662" y="232" width="110" height="16" rx="8" fill="#2563eb"/>
      <text x="717" y="243" class="badge" text-anchor="middle">Node + Python</text>

      <rect x="996" y="246" width="300" height="150" rx="18" fill="#fff" stroke="#bfdbfe"/>
      <image href="architecture-assets/aws-icons/Arch_AWS-Lambda_64.svg" x="1014" y="260" width="50" height="50"/>
      <text x="1080" y="282" class="title">Receipt ingestion APIs</text>
      <text x="1080" y="302" class="body">ReceiptUploadUrlFunction and ReceiptExtractorFunction</text>
      <text x="1080" y="318" class="body">Pre-signed upload URL, S3 receipt image ingest, OpenAI extraction</text>
      <text x="1080" y="334" class="body">Writes normalized receipt data into StoreReceiptLedger</text>
      <rect x="996" y="232" width="110" height="16" rx="8" fill="#2563eb"/>
      <text x="1051" y="243" class="badge" text-anchor="middle">Node + S3 event</text>

      <rect x="1330" y="246" width="300" height="150" rx="18" fill="#fff" stroke="#bfdbfe"/>
      <image href="architecture-assets/aws-icons/Arch_AWS-Lambda_64.svg" x="1348" y="260" width="50" height="50"/>
      <text x="1414" y="282" class="title">Research and reporting APIs</text>
      <text x="1414" y="302" class="body">AssetHubFunction and WheelScanReadFunction</text>
      <text x="1414" y="318" class="body">Async research jobs, report lookup, history, latest scan, trigger endpoint</text>
      <text x="1414" y="334" class="body">Serves Asset Hub and Wheel Scan UI</text>
      <rect x="1330" y="232" width="110" height="16" rx="8" fill="#2563eb"/>
      <text x="1385" y="243" class="badge" text-anchor="middle">Node + Python</text>

      <!-- Data lane -->
      <rect x="54" y="540" width="330" height="120" rx="18" fill="#fff" stroke="#bbf7d0"/>
      <image href="architecture-assets/aws-icons/Arch_Amazon-DynamoDB_64.svg" x="72" y="554" width="52" height="52"/>
      <text x="140" y="576" class="title">Household and app state tables</text>
      <text x="140" y="596" class="body">FinAccounts, FinAccountMembers, FinAccountInvitesV2</text>
      <text x="140" y="612" class="body">Ownership, member permissions, invite acceptance</text>

      <rect x="420" y="540" width="360" height="120" rx="18" fill="#fff" stroke="#bbf7d0"/>
      <image href="architecture-assets/aws-icons/Arch_Amazon-DynamoDB_64.svg" x="438" y="554" width="52" height="52"/>
      <text x="506" y="576" class="title">Investment and app workflow state</text>
      <text x="506" y="596" class="body">finAssets and PriceCacheTable</text>
      <text x="506" y="612" class="body">Transactions, holdings, NAV inputs, Asset Hub jobs, cached price support</text>

      <rect x="816" y="540" width="380" height="120" rx="18" fill="#fff" stroke="#bbf7d0"/>
      <image href="architecture-assets/aws-icons/Arch_Amazon-DynamoDB_64.svg" x="834" y="554" width="52" height="52"/>
      <text x="902" y="576" class="title">Spending and curation state</text>
      <text x="902" y="596" class="body">StoreReceiptLedger, SpendingAggregates, CategoryMaster, CategoryProposals</text>
      <text x="902" y="612" class="body">Receipt lines, summary rows, rollups, and category normalization support</text>

      <rect x="1232" y="540" width="398" height="120" rx="18" fill="#fff" stroke="#bbf7d0"/>
      <image href="architecture-assets/aws-icons/Arch_Amazon-Simple-Storage-Service_64.svg" x="1250" y="554" width="52" height="52"/>
      <text x="1318" y="576" class="title">S3 buckets</text>
      <text x="1318" y="596" class="body">Frontend bucket, Receipts bucket, Analytics bucket, Metals bucket, Stocks snapshot bucket</text>
      <text x="1318" y="612" class="body">Static app assets, receipt uploads, research reports, scheduled snapshots</text>

      <!-- Bottom lane -->
      <rect x="54" y="808" width="270" height="122" rx="18" fill="#fff" stroke="#fdba74"/>
      <image href="architecture-assets/aws-icons/Arch_Amazon-EventBridge_64.svg" x="72" y="822" width="50" height="50"/>
      <text x="138" y="844" class="title">Scheduled background jobs</text>
      <text x="138" y="864" class="body">EventBridge triggers MetalsSnapshot, StocksSnapshot, CurateBatchFunction, WheelScan</text>
      <text x="138" y="880" class="body">These keep reports, prices, and curation fresh</text>

      <rect x="360" y="808" width="250" height="122" rx="18" fill="#fff" stroke="#fdba74"/>
      <text x="384" y="844" class="title">OpenAI</text>
      <text x="384" y="864" class="body">Receipt OCR/extraction and spending category curation</text>

      <rect x="646" y="808" width="250" height="122" rx="18" fill="#fff" stroke="#fdba74"/>
      <text x="670" y="844" class="title">Anthropic Claude</text>
      <text x="670" y="864" class="body">Wheel Scan and Asset Hub narrative analysis</text>

      <rect x="932" y="808" width="250" height="122" rx="18" fill="#fff" stroke="#fdba74"/>
      <text x="956" y="844" class="title">yfinance</text>
      <text x="956" y="864" class="body">Market and options chain data for Python Lambdas</text>

      <rect x="1218" y="808" width="190" height="122" rx="18" fill="#fff" stroke="#fdba74"/>
      <text x="1242" y="844" class="title">Finnhub</text>
      <text x="1242" y="864" class="body">Stocks snapshot enrichment</text>

      <rect x="1444" y="808" width="186" height="122" rx="18" fill="#fff" stroke="#fdba74"/>
      <text x="1468" y="844" class="title">Massive / Polygon</text>
      <text x="1468" y="864" class="body">Options quote endpoint</text>
      <text x="1468" y="880" class="body">used by OptionsQuoteFunction</text>

      <!-- Arrows -->
      <line x1="300" y1="106" x2="360" y2="106" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
      <line x1="710" y1="106" x2="780" y2="106" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
      <line x1="1000" y1="106" x2="1060" y2="106" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

      <line x1="1275" y1="152" x2="1275" y2="246" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

      <line x1="1480" y1="396" x2="600" y2="540" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
      <line x1="1480" y1="396" x2="1430" y2="540" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>

      <line x1="189" y1="808" x2="1430" y2="660" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>
      <line x1="189" y1="808" x2="1006" y2="660" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>

      <line x1="485" y1="808" x2="1146" y2="396" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>
      <line x1="485" y1="808" x2="1006" y2="396" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>

      <line x1="1057" y1="808" x2="1480" y2="396" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>

      <line x1="1537" y1="808" x2="812" y2="396" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>

      <!-- Flow legend -->
      <rect x="54" y="948" width="1576" height="26" rx="13" fill="#fff" stroke="#cbd5e1"/>
      <line x1="82" y1="961" x2="130" y2="961" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="142" y="965" class="small">Primary request routing</text>
      <line x1="332" y1="961" x2="380" y2="961" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
      <text x="392" y="965" class="small">Main data persistence path</text>
      <line x1="638" y1="961" x2="686" y2="961" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>
      <text x="698" y="965" class="small">External provider or scheduled flow</text>
      <text x="980" y="965" class="small">Grouped boxes intentionally reduce internal arrow noise so the diagram stays readable.</text>
    </svg>
  </div>

  <div class="note">Icon source: AWS Architecture Icons at https://aws.amazon.com/architecture/icons/</div>
</div>

</html>
